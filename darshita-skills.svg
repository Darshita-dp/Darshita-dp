<svg xmlns="http://www.w3.org/2000/svg" width="430" height="210" viewBox="0 0 430 210" role="img" aria-label="Darshita Patel core capabilities">
<defs>
  <linearGradient id="line" x1="0" x2="1"><stop stop-color="#67e8f9"/><stop offset=".5" stop-color="#a78bfa"/><stop offset="1" stop-color="#f472b6"/></linearGradient>
  <style>.s{font-family:Segoe UI,Arial,sans-serif}.m{font-family:Consolas,monospace}.r{opacity:1;animation:in .55s ease both}@keyframes in{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}</style>
</defs>
<rect x="2" y="2" width="426" height="206" rx="18" fill="#170e28" stroke="#ec4899" stroke-width="2"/>
<text x="24" y="34" class="m" font-size="15" font-weight="700" fill="#f472b6">Core Capabilities</text>
<rect x="24" y="46" width="382" height="2" rx="1" fill="url(#line)"><animate attributeName="width" values="0;382" dur="1.1s" fill="freeze"/></rect>
<g class="r" style="animation-delay:.2s"><circle cx="34" cy="72" r="5" fill="#67e8f9"/><text x="52" y="76" class="s" font-size="13" font-weight="700" fill="#e9e4f2">SQL &amp; Data Modeling</text><text x="52" y="93" class="m" font-size="10.5" fill="#9386aa">validation • star schema • KPI logic</text></g>
<g class="r" style="animation-delay:.4s"><circle cx="34" cy="112" r="5" fill="#a78bfa"/><text x="52" y="116" class="s" font-size="13" font-weight="700" fill="#e9e4f2">Python &amp; Data Pipelines</text><text x="52" y="133" class="m" font-size="10.5" fill="#9386aa">ETL • quality rules • analytics • ML</text></g>
<g class="r" style="animation-delay:.6s"><circle cx="34" cy="152" r="5" fill="#fbbf24"/><text x="52" y="156" class="s" font-size="13" font-weight="700" fill="#e9e4f2">Power BI &amp; Decision Support</text><text x="52" y="173" class="m" font-size="10.5" fill="#9386aa">DAX • Power Query • executive reporting</text></g>
<g class="r" style="animation-delay:.8s"><circle cx="34" cy="192" r="5" fill="#f472b6"/><text x="52" y="196" class="s" font-size="13" font-weight="700" fill="#e9e4f2">React, FastAPI &amp; Automation</text></g>
</svg>
